<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SUBJECT}}</title>
  </head>
  <body style="margin:0;padding:0;background:#F2F0EC;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#F2F0EC;margin:0;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#FFFFFF;border-collapse:collapse;font-family:Arial,sans-serif;color:#1A1A1A;">
            
            <!-- Header -->
            <tr>
              <td style="background:#1A1A1A;padding:24px 32px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td align="left" valign="middle">
                      <div style="font-size:22px;font-weight:700;letter-spacing:0.4px;color:#FFFFFF;">VITAN</div>
                    </td>
                    <td align="right" valign="middle" style="color:#F5F5F3;">
                      <div style="font-size:11px;line-height:1.5;letter-spacing:1px;text-transform:uppercase;color:#D8D5CF;">Adding life, every square foot</div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Hero Image -->
            <tr>
              <td>
                <img src="{{HERO_IMAGE_URL}}" alt="Vitan Architects" width="680" style="display:block;width:100%;max-width:680px;height:auto;border:0;">
              </td>
            </tr>

            <!-- Content Body -->
            <tr>
              <td style="padding:40px 32px 32px;">
                <div style="font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:#D42B2B;font-weight:700;margin-bottom:12px;">{{CATEGORY}}</div>
                <h1 style="margin:0 0 20px;font-size:28px;line-height:1.2;color:#1A1A1A;">{{HEADLINE}}</h1>
                
                <div style="font-size:16px;line-height:1.8;color:#4A4A4A;">
                  {{CONTENT_HTML}}
                </div>

                <!-- Action Button -->
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin-top:28px;margin-bottom:28px;">
                  <tr>
                    <td bgcolor="#D42B2B" style="border-radius:2px;">
                      <a href="{{ACTION_URL}}" style="display:inline-block;padding:14px 24px;font-size:14px;line-height:1;font-weight:700;letter-spacing:0.4px;color:#FFFFFF;text-decoration:none;">{{ACTION_TEXT}}</a>
                    </td>
                  </tr>
                </table>

                <p style="margin:20px 0 0;font-size:15px;line-height:1.8;color:#4A4A4A;">
                  Best regards,<br>
                  <strong style="color:#1A1A1A;">Jagrut Patel</strong><br>
                  <span style="font-size:13px;color:#6B655C;">Founder & Principal Architect, Vitan Architects</span>
                </p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:24px 32px;background:#F8F6F1;border-top:1px solid #E4DED3;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td>
                      <div style="font-size:12px;line-height:1.8;color:#6B655C;">
                        <strong>Vitan Architects</strong><br>
                        702, Hetdev Square, Thaltej, Ahmedabad 380054<br>
                        vitan.in · connect@vitan.in
                      </div>
                    </td>
                    <td align="right" valign="bottom">
                      <div style="font-size:11px;color:#9A9590;">
                        #AddingLifeEverySqFt
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
